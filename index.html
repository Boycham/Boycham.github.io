      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" style-hover=\"color: var(--text-1); transform: scale(1.1)\">Contact<\u002Fbutton>\n        <sc-if value=\"{{ contactOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position: absolute; top: 100%; right: 0; margin-top: 15px; background: var(--bg-1); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 12px 16px; white-space: nowrap\">\n            <a href=\"mailto:boypan485@g.ucla.edu\" style=\"color: var(--text-1); font-size: 14px\">boypan485@g.ucla.edu<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <section ref=\"{{ homeRef }}\" style=\"position: relative; overflow: hidden; min-height: calc(100vh - 50px); display: flex\" data-screen-label=\"Home\">\n    <x-import component-from-global-scope=\"YujiSatoPortfolioDesignSystem_2e46df.WaveBackground\" lines=\"{{ waveLines }}\" spread=\"{{ waveSpread }}\" interactive=\"{{ waveInteractive }}\" hint-size=\"100%,100%\" style=\"position: absolute; inset: 0\"><\u002Fx-import>\n    <div style=\"position: relative; width: 100%; display: flex; align-items: center; box-sizing: border-box; padding: 0 32px\">\n      <div style=\"max-width: 1120px; margin: 0 auto; width: 100%; display: flex; gap: 28px; align-items: flex-start\">\n        <img src=\"4771ce07-e4c6-4039-ab04-3db54c375c25\" alt=\"Portrait of Boyuan Pang\" style=\"width: 128px; height: 128px; border-radius: 50%; object-fit: cover; margin-top: 44px\">\n        <div>\n          <div style=\"display: flex; gap: 14px; margin-bottom: 12px\">\n            <a href=\"https://github.com/Boycham\" target=\"_blank\" rel=\"noopener\" aria-label=\"GitHub\"><img src=\"91e96a45-60b3-4c0e-a526-e23f541d960a\" alt=\"\" style=\"width: 18px; height: 18px; display: block\"><\u002Fa>\n            <a href=\"https://www.linkedin.com/in/boypang\" target=\"_blank\" rel=\"noopener\" aria-label=\"LinkedIn\"><img src=\"8f58f7b3-7468-44be-90c7-a83bd11ca969\" alt=\"\" style=\"width: 18px; height: 18px; display: block; filter: invert(1)\"><\u002Fa>\n            <a href=\"mailto:boypan485@g.ucla.edu\" aria-label=\"Email\"><img src=\"06ac1acd-c923-4071-b568-4e039423b400\" alt=\"\" style=\"width: 18px; height: 18px; display: block; filter: invert(1)\"><\u002Fa>\n          <\u002Fdiv>\n          <h1 style=\"margin: 0; font-size: 64px; font-weight: 700; line-height: 1.05; letter-spacing: -0.01em; color: var(--text-1)\">Boyuan Pang<\u002Fh1>\n          <p style=\"margin: 16px 0 0; font-size: 24px; color: var(--text-1); font-weight: 400\">CS major @ucla<\u002Fp>\n          <div style=\"display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px\">\n            <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); background: var(--bg-1); font-size: 13px\">Python<\u002Fspan>\n            <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); background: var(--bg-1); font-size: 13px\">Java<\u002Fspan>\n            <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); background: var(--bg-1); font-size: 13px\">C++<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section ref=\"{{ aboutRef }}\" style=\"min-height: calc(100vh - 50px); display: flex; align-items: center; box-sizing: border-box; padding: 48px 32px\" data-screen-label=\"Who\">\n    <div style=\"max-width: 1120px; margin: 0 auto; width: 100%\">\n      <div style=\"font-size: 13px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px\">01<\u002Fdiv>\n      <h2 style=\"margin: 0 0 32px; font-size: 40px; font-weight: 700; line-height: 1.05; letter-spacing: -0.01em; color: var(--text-1)\">Who?<\u002Fh2>\n      <p style=\"margin: 0; max-width: 720px; font-size: 20px; line-height: 1.6; text-wrap: pretty\">Driven Computer Science student at UCLA with a strong foundation in full-stack development, software architecture, and systems logic. Proven ability to build fully functional applications from scratch and deliver competition-tested code using Java, Python, and C++. A proactive problem-solver with a track record of collaborating effectively in fast-paced team environments to ship high-quality software.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section ref=\"{{ projectsRef }}\" style=\"min-height: calc(100vh - 50px); display: flex; flex-direction: column\" data-screen-label=\"Projects\">\n    <div style=\"flex: 1; display: flex; align-items: center; box-sizing: border-box; padding: 48px 32px 32px\">\n      <div style=\"max-width: 1120px; margin: 0 auto; width: 100%\">\n        <div style=\"font-size: 13px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px\">02<\u002Fdiv>\n        <h2 style=\"margin: 0 0 32px; font-size: 40px; font-weight: 700; line-height: 1.05; letter-spacing: -0.01em; color: var(--text-1)\">Projects<\u002Fh2>\n        <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px\">\n          <a href=\"https://github.com/Boycham/Bloons-game-Project\" target=\"_blank\" rel=\"noopener\" style=\"display: block; background: var(--bg-1); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; color: var(--text-2); text-decoration: none\" style-hover=\"border-color: var(--text-3)\">\n            <h3 style=\"margin: 0; font-size: 24px; font-weight: 700; color: var(--text-1); line-height: 1.2\">Bloons Game<\u002Fh3>\n            <p style=\"margin: 12px 0 0; font-size: 16px\">A tower-defense game recreating Bloons TD 6, built from scratch in Java.<\u002Fp>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px\">\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">Java<\u002Fspan>\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">Java Swing<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n          <a href=\"https://github.com/Boycham/scholarship-application-project\" target=\"_blank\" rel=\"noopener\" style=\"display: block; background: var(--bg-1); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; color: var(--text-2); text-decoration: none\" style-hover=\"border-color: var(--text-3)\">\n            <h3 style=\"margin: 0; font-size: 24px; font-weight: 700; color: var(--text-1); line-height: 1.2\">Scholarship Auto-Applier<\u002Fh3>\n            <p style=\"margin: 12px 0 0; font-size: 16px\">Automation that fills out no-essay scholarship applications on FastWeb.<\u002Fp>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px\">\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">Python<\u002Fspan>\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">Playwright<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n          <a href=\"https://github.com/team4186/season-2025\" target=\"_blank\" rel=\"noopener\" style=\"display: block; background: var(--bg-1); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; color: var(--text-2); text-decoration: none\" style-hover=\"border-color: var(--text-3)\">\n            <h3 style=\"margin: 0; font-size: 24px; font-weight: 700; color: var(--text-1); line-height: 1.2\">FRC 4186 Robot Code<\u002Fh3>\n            <p style=\"margin: 12px 0 0; font-size: 16px\">Competition robot code for Team 4186's 2025 REEFSCAPE season.<\u002Fp>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px\">\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">Java<\u002Fspan>\n              <span style=\"padding: 3px 12px; border-radius: 9999px; border: 1px solid var(--border-subtle); font-size: 13px; color: var(--text-3)\">WPILib<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <footer style=\"border-top: 1px solid var(--border-subtle)\">\n      <div style=\"max-width: 1120px; margin: 0 auto; padding: 32px; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-3)\">\n        <span>Boyuan Pang<\u002Fspan>\n        <a href=\"mailto:boypan485@g.ucla.edu\" style=\"color: var(--text-3)\" style-hover=\"color: var(--text-1)\">boypan485@g.ucla.edu<\u002Fa>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fsection>\n\n  <button ref=\"{{ nextRef }}\" onclick=\"{{ goNext }}\" aria-label=\"Scroll to next section\" style=\"position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; padding: 8px 16px; cursor: pointer; color: var(--text-3); font-family: var(--font-sans); transition: opacity 0.4s ease-out, color 0.2s ease-out, transform 0.2s ease-out\" style-hover=\"color: var(--text-1); transform: translateX(-50%) scale(1.1)\">\n    <span style=\"font-size: 14px; letter-spacing: 0.06em\">{{ nextLabel }}<\u002Fspan>\n    <span style=\"display: block; font-size: 16px; line-height: 1; animation: bobDown 1.6s ease-in-out infinite\">↓<\u002Fspan>\n  <\u002Fbutton>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;\\&quot;dark\\&quot; | \\&quot;light\\&quot;&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;waveLines&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:32,&quot;min&quot;:6,&quot;max&quot;:80,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Wave&quot;},&quot;waveSpread&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.13,&quot;min&quot;:0.05,&quot;max&quot;:0.4,&quot;step&quot;:0.01,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Wave&quot;},&quot;waveInteractive&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Wave&quot;}}\">\nclass Component extends DCLogic {\n  state = { contactOpen: false, section: 0 };\n  homeRef = React.createRef();\n  aboutRef = React.createRef();\n  projectsRef = React.createRef();\n  nextRef = React.createRef();\n  componentDidMount() {\n    this.applyTheme();\n    this.applyDescriptor();\n    this.onScroll = () => {\n      const mid = window.scrollY + window.innerHeight * 0.55;\n      let idx = 0;\n      this.sectionTops().forEach((t, i) => { if (mid >= t) idx = i; });\n      if (idx !== this.state.section) this.setState({ section: idx });\n    };\n    window.addEventListener(\"scroll\", this.onScroll, { passive: true });\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"scroll\", this.onScroll);\n  }\n  componentDidUpdate() { this.applyTheme(); this.applyDescriptor(); }\n  sectionTops() {\n    return [this.homeRef, this.aboutRef, this.projectsRef].map(r =>\n      r.current ? r.current.getBoundingClientRect().top + window.scrollY : 0);\n  }\n  applyDescriptor() {\n    const el = this.nextRef.current;\n    if (!el) return;\n    const show = this.state.section < 2;\n    el.style.opacity = show ? \"1\" : \"0\";\n    el.style.pointerEvents = show ? \"auto\" : \"none\";\n  }\n  applyTheme() {\n    document.documentElement.setAttribute(\"data-theme\", this.props.theme ?? \"dark\");\n  }\n  scrollToSection(i) {\n    const tops = this.sectionTops();\n    const idx = Math.max(0, Math.min(2, i));\n    window.scrollTo({ top: Math.max(0, tops[idx] - 50), behavior: \"smooth\" });\n  }\n  renderVals() {\n    return {\n      waveLines: this.props.waveLines ?? 34,\n      waveSpread: this.props.waveSpread ?? 0.16,\n      waveInteractive: this.props.waveInteractive ?? true,\n      contactOpen: this.state.contactOpen,\n      toggleContact: () => this.setState(s => ({ contactOpen: !s.contactOpen })),\n      homeRef: this.homeRef,\n      aboutRef: this.aboutRef,\n      projectsRef: this.projectsRef,\n      nextRef: this.nextRef,\n      nextLabel: [\"Who?\", \"Projects\"][Math.min(this.state.section, 1)],\n      goNext: () => this.scrollToSection(this.state.section + 1),\n      goAbout: () => this.scrollToSection(1),\n      goProjects: () => this.scrollToSection(2),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
